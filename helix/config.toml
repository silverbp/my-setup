[editor]
line-number = "relative"
mouse = true
auto-save = true
completion-trigger-len = 1
color-modes = true
bufferline = "multiple"
rulers = [120]

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.file-picker]
hidden = false

[editor.statusline]
left = ["mode", "spinner", "file-name", "file-modification-indicator"]
center = ["diagnostics"]
right = ["selections", "position", "file-encoding", "file-line-ending", "file-type"]

[editor.lsp]
display-messages = true
display-inlay-hints = true

[editor.indent-guides]
render = true
character = "╎"

[editor.whitespace.render]
tab = "all"
newline = "none"

[keys.normal]
# easier window navigation
"C-h" = "jump_view_left"
"C-l" = "jump_view_right"
"C-k" = "jump_view_up"
"C-j" = "jump_view_down"
# quick save
"C-s" = ":w"
# clear search highlight
"C-/" = "no_op"
# clipboard
"y" = "yank_to_clipboard"
"p" = "paste_clipboard_after"
"P" = "paste_clipboard_before"
"d" = ["yank_to_clipboard", "delete_selection"]
"R" = "replace_selections_with_clipboard"

[keys.select]
"y" = ["yank_to_clipboard", "normal_mode"]
"d" = ["yank_to_clipboard", "delete_selection", "normal_mode"]
"p" = "paste_clipboard_after"
"R" = "replace_selections_with_clipboard"

[keys.insert]
"C-s" = ["normal_mode", ":w"]
